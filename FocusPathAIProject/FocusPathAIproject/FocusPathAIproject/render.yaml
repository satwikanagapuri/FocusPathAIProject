services:
  - type: web
    name: focuspath-ai-backend
    runtime: node
    rootDir: FocusPathAIproject/FocusPathAIproject/backend
    buildCommand: npm install && PRISMA_SCHEMA_PATH=prisma/schema.postgres.prisma npx prisma generate && PRISMA_SCHEMA_PATH=prisma/schema.postgres.prisma npx prisma migrate deploy
    startCommand: node src/index.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_PORT
        value: 4000
      - key: DEMO_MODE
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: focuspath-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://satwikanagapuri.github.io

databases:
  - name: focuspath-db
    plan: free
